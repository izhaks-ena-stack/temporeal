<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro - Tempo Real</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/cronometro.css">
</head>
<body class="bg-light text-dark">

<div class="d-flex">

   
    <div class="bg-white border-end shadow-sm p-4" style="width: 250px; min-height: 100vh; flex-shrink: 0;">
        <h2 class="text-primary mb-5">
            <i class="bi bi-phone"></i>
            Tempo Real
        </h2>

        <ul class="nav flex-column">

            <li class="nav-item mb-3">
                <a href="home.html" class="nav-link text-dark">
                    <i class="bi bi-house"></i>
                    Início
                </a>
            </li>

            <li class="nav-item mb-3">
                <a href="monitoramento.html" class="nav-link text-dark">
                    <i class="bi bi-bar-chart"></i>
                    Monitoramento
                </a>
            </li>

            <li class="nav-item mb-3">
                <a href="tarefas.html" class="nav-link text-dark">
                    <i class="bi bi-check-square"></i>
                    Tarefas
                </a>
            </li>

            <li class="nav-item mb-3">
                <a href="cronometro.html" class="nav-link active bg-primary text-white rounded">
                    <i class="bi bi-stopwatch"></i>
                    Cronômetro
                </a>
            </li>
            <li class="nav-item mb-3">
                <a href="alertas.html" class="nav-link text-dark">
                    <i class="bi bi-bell"></i>
                    Alertas
                </a>
            </li>

        <li class="nav-item mb-3">
                <a href="perfil.html" class="nav-link text-dark">
                    <i class="bi bi-person-circle"></i>
                    Perfil
                </a>
            </li>

        </ul>

        <div class="mt-4">
            <hr class="border-secondary">
            <button class="btn btn-outline-danger w-100" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i>
                Sair
            </button>
        </div>

    </div>

    <div class="flex-grow-1 p-4 d-flex flex-column align-items-center">

        <div class="modes mb-4">
            <button id="cronometroMode" class="btn btn-secondary me-2">Cronômetro</button>
            <button id="pomodoroMode" class="btn btn-secondary">Pomodoro</button>
        </div>

        <div class="container-timer">

            <h1>Tempo Real</h1>
            <h2 id="status">Modo: Cronômetro</h2>

            <div id="cronometro">00:00:00</div>

            <div class="buttons mt-3">
                <button id="start" class="btn btn-success me-2">Iniciar</button>
                <button id="pause" class="btn btn-warning me-2">Pausar</button>
                <button id="reset" class="btn btn-danger">Resetar</button>
            </div>

        </div>

        <div class="historico mt-4 w-100" style="max-width: 500px;">
            <h2>Histórico</h2>
            <ul id="listaHistorico" class="list-unstyled"></ul>
        </div>

    </div>

</div>

<script src="js/cronometro.js"></script>
<script src="js/script.js"></script>
</body>
</html>
