<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Perfil - Tempo Real</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .avatar {
      width: 90px; height: 90px; border-radius: 50%;
      background: #0d6efd; color: #fff;
      font-size: 2.2rem; display: flex;
      align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .badge-tipo {
      font-size: .75rem; letter-spacing: .05em; text-transform: uppercase;
    }
    .section-title {
      font-size: .8rem; text-transform: uppercase;
      letter-spacing: .08em; color: #6c757d;
      margin-bottom: .75rem; margin-top: 1.5rem;
    }
    .admin-card { border-left: 4px solid #0d6efd; }
  </style>
</head>
<body>

  <!-- Navbar simples -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="home.html">Tempo Real</a>
      <div class="ms-auto d-flex gap-2">
        <a href="home.html" class="btn btn-outline-light btn-sm">← Início</a>
        <button class="btn btn-light btn-sm" onclick="logout()">Sair</button>
      </div>
    </div>
  </nav>

  <div class="container py-4" style="max-width: 700px;">

    <!-- Card de perfil -->
    <div class="card shadow-sm rounded-4 p-4 text-center mb-4">
      <div class="avatar" id="avatarLetra">?</div>
      <h4 class="mb-0" id="perfilNome">—</h4>
      <span class="badge bg-primary badge-tipo mt-1" id="perfilTipo">—</span>
      <p class="text-muted small mt-2 mb-0" id="perfilEmail">—</p>
    </div>

    <!-- dados pessoais -->
    <p class="section-title">Dados pessoais</p>
    <div class="card shadow-sm rounded-4 p-4 mb-4">
      <div class="row g-3">
        <div class="col-sm-6">
          <label class="form-label fw-semibold small">Nome</label>
          <input type="text" id="editNome" class="form-control">
        </div>
        <div class="col-sm-6">
          <label class="form-label fw-semibold small">Email</label>
          <input type="email" id="editEmail" class="form-control">
        </div>
        <div class="col-sm-6">
          <label class="form-label fw-semibold small">Telefone</label>
          <input type="text" id="editTelefone" class="form-control">
        </div>
        <div class="col-sm-6">
          <label class="form-label fw-semibold small">Cidade</label>
          <input type="text" id="editCidade" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold small">Escola / Universidade</label>
          <input type="text" id="editEscola" class="form-control">
        </div>
      </div>
      <button class="btn btn-primary mt-3 w-100" onclick="salvarPerfil()">Salvar alterações</button>
      <div id="msgPerfil" class="alert alert-success mt-3 d-none">Perfil atualizado!</div>
    </div>

    <!-- trocar senha -->
    <p class="section-title">Trocar senha</p>
    <div class="card shadow-sm rounded-4 p-4 mb-4">
      <div class="row g-3">
        <div class="col-sm-6">
          <label class="form-label fw-semibold small">Nova senha</label>
          <input type="password" id="novaSenha" class="form-control" placeholder="Nova senha">
        </div>
        <div class="col-sm-6">
          <label class="form-label fw-semibold small">Confirmar</label>
          <input type="password" id="confirmarNovaSenha" class="form-control" placeholder="Confirmar">
        </div>
      </div>
      <button class="btn btn-outline-primary mt-3 w-100" onclick="trocarSenha()">Alterar senha</button>
      <div id="msgSenha" class="alert mt-3 d-none" id="msgSenha"></div>
    </div>

    <!-- adm pra professor -->
    <div id="painelAdmin" class="d-none">
      <p class="section-title">Painel Administrativo</p>

      <!-- listagem de usuários -->
      <div class="card shadow-sm rounded-4 p-4 mb-4 admin-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="mb-0">Usuários cadastrados</h6>
          <input type="text" id="buscaUsuario" class="form-control form-control-sm w-50"
            placeholder="Buscar por nome ou email" oninput="filtrarUsuarios()">
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Tipo</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tabelaUsuarios"></tbody>
          </table>
        </div>
      </div>

      <!-- listagem de alunos monitoramento -->
      <div class="card shadow-sm rounded-4 p-4 mb-4 admin-card">
        <h6 class="mb-3">Alunos monitorados</h6>
        <div class="table-responsive">
          <table class="table table-sm table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>Nome</th><th>Nota</th><th>Frequência</th><th>Status</th><th></th>
              </tr>
            </thead>
            <tbody id="tabelaAlunosAdmin"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="js/script.js"></script>
  <script>
    const API = "http://localhost:3000";
    let todosUsuarios = [];
    const user = JSON.parse(sessionStorage.getItem("usuarioLogado"));

    // Preenche campos
    function preencherPerfil(u) {
      document.getElementById("avatarLetra").textContent = u.nome?.charAt(0).toUpperCase() || "?";
      document.getElementById("perfilNome").textContent = u.nome || "—";
      document.getElementById("perfilTipo").textContent = u.tipo || u.categoria || "—";
      document.getElementById("perfilEmail").textContent = u.email || "—";
      document.getElementById("editNome").value = u.nome || "";
      document.getElementById("editEmail").value = u.email || "";
      document.getElementById("editTelefone").value = u.telefone || "";
      document.getElementById("editCidade").value = u.cidade || "";
      document.getElementById("editEscola").value = u.escola || "";
    }

    async function salvarPerfil() {
      const atualizado = {
        ...user,
        nome: document.getElementById("editNome").value.trim(),
        email: document.getElementById("editEmail").value.trim(),
        telefone: document.getElementById("editTelefone").value.trim(),
        cidade: document.getElementById("editCidade").value.trim(),
        escola: document.getElementById("editEscola").value.trim(),
      };

      await fetch(`${API}/usuarios/${user.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(atualizado)
      });

      sessionStorage.setItem("usuarioLogado", JSON.stringify(atualizado));
      preencherPerfil(atualizado);

      const msg = document.getElementById("msgPerfil");
      msg.classList.remove("d-none");
      setTimeout(() => msg.classList.add("d-none"), 3000);
    }

    async function trocarSenha() {
      const nova = document.getElementById("novaSenha").value;
      const conf = document.getElementById("confirmarNovaSenha").value;
      const msg = document.getElementById("msgSenha");

      if (!nova || nova !== conf) {
        msg.className = "alert alert-danger mt-3";
        msg.textContent = "As senhas não coincidem.";
        msg.classList.remove("d-none");
        return;
      }

      const atualizado = { ...user, senha: nova };
      await fetch(`${API}/usuarios/${user.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(atualizado)
      });
      sessionStorage.setItem("usuarioLogado", JSON.stringify(atualizado));

      msg.className = "alert alert-success mt-3";
      msg.textContent = "Senha alterada com sucesso!";
      msg.classList.remove("d-none");
      document.getElementById("novaSenha").value = "";
      document.getElementById("confirmarNovaSenha").value = "";
      setTimeout(() => msg.classList.add("d-none"), 3000);
    }

    //  Admin 
    async function carregarAdmin() {
      // Usuários
      const r1 = await fetch(`${API}/usuarios`);
      todosUsuarios = await r1.json();
      renderizarUsuarios(todosUsuarios);

      // Alunos monitorados
      const r2 = await fetch(`${API}/alunos`);
      const alunos = await r2.json();
      renderizarAlunos(alunos);
    }

    function renderizarUsuarios(lista) {
      const tb = document.getElementById("tabelaUsuarios");
      tb.innerHTML = lista.map(u => `
        <tr>
          <td>${u.nome}</td>
          <td>${u.email}</td>
          <td><span class="badge bg-secondary">${u.tipo || u.categoria || "—"}</span></td>
          <td>
            <button class="btn btn-sm btn-outline-danger" onclick="deletarUsuario('${u.id}')">Remover</button>
          </td>
        </tr>
      `).join("");
    }

    function filtrarUsuarios() {
      const termo = document.getElementById("buscaUsuario").value.toLowerCase();
      const filtrados = todosUsuarios.filter(u =>
        u.nome.toLowerCase().includes(termo) || u.email.toLowerCase().includes(termo)
      );
      renderizarUsuarios(filtrados);
    }

    async function deletarUsuario(id) {
      if (id === user.id) { alert("Você não pode remover sua própria conta."); return; }
      if (!confirm("Remover este usuário?")) return;
      await fetch(`${API}/usuarios/${id}`, { method: "DELETE" });
      carregarAdmin();
    }

    function renderizarAlunos(alunos) {
      const tb = document.getElementById("tabelaAlunosAdmin");
      tb.innerHTML = alunos.map(a => `
        <tr>
          <td>${a.nome}</td>
          <td>${a.nota}</td>
          <td>${a.frequencia}%</td>
          <td><span class="badge bg-${a.status === 'Atenção' ? 'danger' : a.status === 'Excelente' ? 'success' : 'warning'}">${a.status}</span></td>
          <td>
            <button class="btn btn-sm btn-outline-danger" onclick="deletarAluno('${a.id}')">Remover</button>
          </td>
        </tr>
      `).join("");
    }

    async function deletarAluno(id) {
      if (!confirm("Remover este aluno?")) return;
      await fetch(`${API}/alunos/${id}`, { method: "DELETE" });
      carregarAdmin();
    }

    //  Init 
    preencherPerfil(user);

    const tipo = (user.tipo || user.categoria || "").toLowerCase();
    if (tipo === "professor") {
      document.getElementById("painelAdmin").classList.remove("d-none");
      carregarAdmin();
    }
  </script>

</body>
</html>
