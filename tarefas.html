<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarefas - Tempo Real</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/tarefas.css">
  <style>
    /* reseta o max-width/margin antigo do css/tarefas.css, que era feito
       para uma página sem sidebar e estava espremendo o layout inteiro */
    body {
      max-width: none;
      margin: 0;
      padding: 0;
      background: #f0f2f5;
    }
    .sidebar { width: 250px; min-height: 100vh; flex-shrink: 0; background: #fff; border-right: 1px solid #dee2e6; }
    .flex-grow-1.p-4 { max-width: 900px; }
  </style>
</head>
<body>

<div class="d-flex">

  <div class="sidebar shadow-sm p-4">
    <h2 class="text-primary mb-5"><i class="bi bi-phone"></i> Tempo Real</h2>
    <ul class="nav flex-column">
      <li class="nav-item mb-3">
        <a href="home.html" class="nav-link text-dark">
          <i class="bi bi-house"></i> Início
        </a>
      </li>
      <li class="nav-item mb-3">
        <a href="monitoramento.html" class="nav-link text-dark">
          <i class="bi bi-bar-chart"></i> Monitoramento
        </a>
      </li>
      <li class="nav-item mb-3">
        <a href="tarefas.html" class="nav-link active bg-primary text-white rounded">
          <i class="bi bi-check-square"></i> Tarefas
        </a>
      </li>
      <li class="nav-item mb-3">
        <a href="cronometro.html" class="nav-link text-dark">
          <i class="bi bi-stopwatch"></i> Cronômetro
        </a>
      </li>
      <li class="nav-item mb-3">
        <a href="alertas.html" class="nav-link text-dark">
          <i class="bi bi-bell"></i> Alertas
        </a>
      </li>
      <li class="nav-item mb-3">
        <a href="perfil.html" class="nav-link text-dark">
          <i class="bi bi-person-circle"></i> Perfil
        </a>
      </li>
    </ul>
    <div class="mt-4">
      <hr>
      <button class="btn btn-outline-danger w-100" onclick="logout()">
        <i class="bi bi-box-arrow-right"></i> Sair
      </button>
    </div>
  </div>

  <div class="flex-grow-1 p-4">

    <h1>Agenda de Tarefas</h1>

    <form id="form-tarefa">
      <h3 id="titulo-form">Adicionar Tarefa</h3>
      <input type="text" id="titulo" placeholder="Título" required />
      <input type="text" id="descricao" placeholder="Descrição" />
      <select id="tipo">
        <option value="tarefa">Tarefa</option>
        <option value="prova">Prova</option>
      </select>
      <input type="date" id="data" />
      <input type="text" id="duracao" placeholder="Duração (ex: 2h 30min)" />
      <button type="submit">Salvar</button>
    </form>

    <div class="cabecalho-mes">
      <button id="btn-anterior">&lt;</button>
      <h2 id="mes-ano"></h2>
      <button id="btn-proximo">&gt;</button>
    </div>

    <div class="grade">
      <div class="nome-dia">Dom</div>
      <div class="nome-dia">Seg</div>
      <div class="nome-dia">Ter</div>
      <div class="nome-dia">Qua</div>
      <div class="nome-dia">Qui</div>
      <div class="nome-dia">Sex</div>
      <div class="nome-dia">Sáb</div>
    </div>
    <div class="grade" id="grade-dias"></div>

    <div class="legenda">
      <span><span class="ponto prova"></span> prova</span>
      <span><span class="ponto tarefa"></span> tarefa</span>
    </div>

    <div id="painel-dia">
      <h3 id="painel-titulo">Clique em um dia para ver as tarefas</h3>
      <ul id="lista-dia"></ul>
    </div>

  </div>
</div>

<script src="js/script.js"></script>
<script src="js/script-tarefas.js"></script>

</body>
</html>
