<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro - Tempo Real</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5 d-flex justify-content-center align-items-center">
    <div class="card shadow p-4 rounded-4" style="width: 450px;">

      <h1 class="text-center text-primary mb-2">Tempo Real</h1>
      <p class="text-center text-secondary mb-4">Crie sua conta</p>

      <div id="erroCadastro" class="alert alert-danger d-none"></div>

      <input type="text"     id="nome"            class="form-control mb-3" placeholder="Nome completo">
      <input type="text"     id="telefone"         class="form-control mb-3" placeholder="Telefone">
      <input type="text"     id="cidade"           class="form-control mb-3" placeholder="Cidade">

      <select id="categoria" class="form-select mb-3">
        <option value="">Selecione uma categoria</option>
        <option value="Professor">Professor</option>
        <option value="Aluno">Aluno</option>
        <option value="Pais">Pais</option>
      </select>

      <input type="text"     id="escola"           class="form-control mb-3" placeholder="Escola/Universidade">
      <input type="email"    id="email"            class="form-control mb-3" placeholder="Email">
      <input type="password" id="senha"            class="form-control mb-3" placeholder="Senha">
      <input type="password" id="confirmarSenha"   class="form-control mb-4" placeholder="Confirmar senha">

      <button class="btn btn-primary w-100 mb-3" onclick="cadastrar()">Cadastrar</button>
      <a href="index.html">
        <button class="btn btn-outline-primary w-100">Voltar para Login</button>
      </a>

    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
